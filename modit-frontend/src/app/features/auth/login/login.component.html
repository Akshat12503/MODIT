<div class="auth-container">
  <div class="auth-card">
    <h1>MODIT</h1>
    <p class="subtitle">Building materials, delivered smarter.</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="email" required placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="password" required placeholder="••••••••" />
      </div>

      @if (errorMessage()) {
        <p class="error-text">{{ errorMessage() }}</p>
      }

      <button type="submit" [disabled]="!loginForm.valid || loading()">
        {{ loading() ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <p class="switch-text">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
