<div class="auth-container">
  <div class="auth-card">
    <h1>MODIT</h1>
    <p class="subtitle">Create your account</p>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" [(ngModel)]="name" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="email" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="password" required minlength="6" />
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="tel" name="phone" [(ngModel)]="phone" required />
      </div>

      <div class="form-group">
        <label>I am a...</label>
        <select name="role" [(ngModel)]="role" required>
          <option [value]="UserRole.Customer">Homeowner / Customer</option>
          <option [value]="UserRole.Contractor">Contractor / Builder</option>
          <option [value]="UserRole.Architect">Architect</option>
          <option [value]="UserRole.Supplier">Supplier / Vendor</option>
        </select>
      </div>

      @if (isBusinessRole) {
        <div class="form-group">
          <label>Company Name</label>
          <input type="text" name="companyName" [(ngModel)]="companyName" />
        </div>

        <div class="form-group">
          <label>GST Number (optional)</label>
          <input type="text" name="gstNumber" [(ngModel)]="gstNumber" />
        </div>
      }

      @if (errorMessage()) {
        <p class="error-text">{{ errorMessage() }}</p>
      }

      <button type="submit" [disabled]="!registerForm.valid || loading()">
        {{ loading() ? 'Creating account...' : 'Register' }}
      </button>
    </form>

    <p class="switch-text">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </div>
</div>
